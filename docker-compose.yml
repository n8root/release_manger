# Release Manager — self-hosted, масштаб до нескольких тысяч пользователей.
# Laravel в laravel/. Конфигурация: корневой .env — контейнеры, laravel/.env — приложение.
# Перед первым запуском: cp .env.example .env и cp laravel/.env.example laravel/.env
#
# Linux: чтобы файлы из контейнера были от вашего пользователя, задайте в .env: UID и GID (id -u, id -g).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    user: "${UID:-1000}:${GID:-1000}"
    container_name: release_manager_app
    restart: unless-stopped
    working_dir: /var/www/html/laravel
    volumes:
      - .:/var/www/html
      - /var/www/html/laravel/node_modules
    env_file:
      - laravel/.env
    environment:
      # Подключение к БД (обязательно: иначе Laravel по умолчанию использует sqlite)
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-release_manager}
      - DB_USERNAME=${DB_USERNAME:-release_manager}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - release_manager

  nginx:
    image: nginx:alpine
    container_name: release_manager_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - release_manager

  pgsql:
    image: postgres:16-alpine
    container_name: release_manager_pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-release_manager}
      POSTGRES_USER: ${DB_USERNAME:-release_manager}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - release_manager

  redis:
    image: redis:7-alpine
    container_name: release_manager_redis
    restart: unless-stopped
    command: redis-server --appendonly no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - release_manager

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    user: "${UID:-1000}:${GID:-1000}"
    container_name: release_manager_queue
    restart: unless-stopped
    working_dir: /var/www/html/laravel
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    env_file:
      - laravel/.env
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-release_manager}
      - DB_USERNAME=${DB_USERNAME:-release_manager}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - release_manager

volumes:
  pgsql_data:
  redis_data:

networks:
  release_manager:
    driver: bridge
